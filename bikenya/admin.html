<!DOCTYPE html>
<html>
<head>
<title>Ride A Pedal Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}
body{
min-height:100vh;
background: linear-gradient(135deg,#e6b85c,#8b4d1d,#4a2b16);
color:white;
}
.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.login-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
}
.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:20px;
}
.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#2b1a0f;
color:white;
cursor:pointer;
}
.show-pass{
width:100%;
text-align:right;
font-size:14px;
margin-bottom:10px;
display:block;
}
.dashboard{
display:none;
}
.sidebar{
width:240px;
height:100vh;
background: rgba(0,0,0,0.45);
backdrop-filter: blur(15px);
padding-top:30px;
position:fixed;
display:flex;
flex-direction:column;
}
.sidebar h2{
text-align:center;
margin-bottom:40px;
}
.sidebar a{
display:block;
padding:14px;
text-align:center;
text-decoration:none;
color:white;
}
.sidebar a:hover{
background:rgba(255,255,255,0.15);
}
.logout{
margin-top:auto;
color:#ff6b6b;
cursor:pointer;
}
.main-content{
margin-left:240px;
padding:40px;
}
.form-box,.table-box{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(20px);
padding:30px;
border-radius:20px;
margin-bottom:30px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:20px;
}
button{
background:#2b1a0f;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}
th{
background: rgba(0,0,0,0.4);
padding:10px;
}
td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}
.btn-delete{
background:#dc3545;
padding:5px 10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>
<div class="login-page" id="loginPage">

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="loginUser" placeholder="Username" required>

<input type="password" id="loginPass" placeholder="Password" required>

<label class="show-pass">
<input type="checkbox" onclick="togglePassword()"> Show Password
</label>

<button onclick="login()">Login</button>

<p id="loginError" style="color:#ff6b6b;margin-top:10px;"></p>

</div>

</div>


<div class="dashboard" id="dashboard">

<div class="sidebar">

<h2>Ride A Pedal</h2>

<a href="#">Admins</a>
<a href="#">Users</a>

<a class="logout" onclick="logout()">Logout</a>

</div>

<div class="main-content">

<h2>Admin Dashboard</h2>


<div class="form-box">

<h3>Add New Admin</h3>

<form id="adminForm">

<input type="text" id="name" placeholder="Name" required>
<input type="text" id="username" placeholder="Username" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Create Admin</button>

</form>

</div>


<div class="table-box">

<h3>All Admins</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Username</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody id="adminTable"></tbody>

</table>

</div>

</div>

</div>

<script>


function togglePassword(){
let pass=document.getElementById("loginPass")
pass.type = pass.type === "password" ? "text" : "password"
}


function login(){

let user=document.getElementById("loginUser").value.trim()
let pass=document.getElementById("loginPass").value.trim()

if(user==="admin" && pass==="12345"){

localStorage.setItem("adminLoggedIn","true")
showDashboard()

}else{

document.getElementById("loginError").innerText="Invalid Login"

}

}


document.addEventListener("keypress",function(e){
if(e.key==="Enter"){
login()
}
})


function logout(){

localStorage.removeItem("adminLoggedIn")
location.reload()

}


function showDashboard(){

document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"

}


if(localStorage.getItem("adminLoggedIn")==="true"){
showDashboard()
}


let admins = JSON.parse(localStorage.getItem("admins")) || []

function displayAdmins(){

let table=document.getElementById("adminTable")
table.innerHTML=""

admins.forEach((admin,index)=>{

table.innerHTML+=`
<tr>
<td>${index+1}</td>
<td>${admin.name}</td>
<td>${admin.username}</td>
<td>${admin.email}</td>
<td>
<button class="btn-delete" onclick="deleteAdmin(${index})">Delete</button>
</td>
</tr>
`

})

}

let adminForm=document.getElementById("adminForm")

if(adminForm){

adminForm.addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("name").value
let username=document.getElementById("username").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value

admins.push({name,username,email,password})

localStorage.setItem("admins",JSON.stringify(admins))

displayAdmins()

this.reset()

})

}

function deleteAdmin(index){

admins.splice(index,1)

localStorage.setItem("admins",JSON.stringify(admins))

displayAdmins()

}

displayAdmins()

</script>

</body>
</html>

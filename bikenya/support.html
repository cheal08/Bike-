<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ride A Pedal - Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { min-height:100vh; background:linear-gradient(to bottom,#c5973c,#6b3e1f); display:flex; flex-direction:column; }
.navbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 50px; background:rgba(255,255,255,0.08); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.15); position:sticky; top:0; z-index:100; position:relative; position:relative;
    }
    .logo { font-size:20px; font-weight:700; color:white; letter-spacing:2px; text-transform:uppercase; flex-shrink:0; }
    .nav-center { position:absolute; left:50%; transform:translateX(-50%); display:flex; }
    .nav-links { list-style:none; display:flex; gap:30px; margin:0; }
    .nav-links a { text-decoration:none; color:rgba(255,255,255,0.85); font-weight:400; font-size:14px; letter-spacing:0.5px; transition:color 0.25s; }
    .nav-links a:hover { color:white; }
    .nav-links a.active { color:rgb(0, 0, 0); font-weight: bold; padding-bottom:2px; }
    .logout-btn-nav {
      padding:8px 22px; background:rgba(255,255,255,0.15); color:white;
      border:1px solid rgba(255,255,255,0.4); border-radius:25px; cursor:pointer;
      font-weight:600; font-size:13px; letter-spacing:0.5px; transition:all 0.25s; font-family:'Poppins',sans-serif;
    }
    .logout-btn-nav:hover { background:white; color:#2b1a0f; }
.container { flex:1; display:flex; justify-content:center; align-items:center; padding:40px 20px; }
.info-card {
  background:rgba(255,255,255,0.2); backdrop-filter:blur(15px); padding:50px 40px;
  border-radius:35px; max-width:700px; width:100%; text-align:center; color:white;
  box-shadow:0 20px 50px rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2);
}
.info-card h2 { font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; font-size:36px; margin-bottom:25px; }
.location-box { margin-top:10px; background:rgba(43,26,15,0.5); padding:30px; border-radius:20px;}
.location-box h4 { color:#ffffff; font-size:20px; margin-bottom:20px; }
.address-text { line-height:1.6; margin-bottom:20px; }
.btn-maps { padding:12px 30px; background:#ffd700; color:#1a0f08; text-decoration:none; border-radius:30px; font-weight:700; display:inline-block; transition:0.3s; }
.btn-maps:hover { background:white; transform:translateY(-3px); }
.contact-info { margin-top:35px; padding-top:25px; border-top:1px solid rgba(255,255,255,0.3); }
.contact-info h3 { font-size:22px; margin-bottom:10px; }
.phone { font-size:22px; font-weight:700; color:#ffd700; margin:10px 0; }
.email { opacity:0.9; }
@media(max-width:768px) { .navbar { padding:15px 20px; flex-wrap:wrap; gap:10px; } .nav-links { gap:12px; flex-wrap:wrap; } .nav-links a { font-size:12px; } }
</style>
</head>
<body>
<nav class="navbar">
  <div class="logo">Ride A Pedal</div>
  <div class="nav-center"><ul class="nav-links">
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="reservation.html">Reservation</a></li>
      <li><a href="Profile.html">Profile</a></li>
      <li><a href="support.html" class="active">Support</a></li>
    </ul></div>
      <button class="logout-btn-nav" id="logoutBtn">Log out</button>
</nav>
<main class="container">
  <div class="info-card">
    <h2>Need Help?</h2>
    <div class="location-box">
      <h4>📍 Pickup Location</h4>
      <address class="address-text">
        <strong>Bambike Manila</strong><br>
        Plaza San Luis Complex,<br>
        Real St. cor. General Luna St.,<br>
        Intramuros, Manila, Philippines
      </address>
      <a href="https://www.google.com/maps?q=Plaza+San+Luis+Complex+Intramuros+Manila+Philippines" target="_blank" class="btn-maps">View on Google Maps</a>
    </div>
    <div class="contact-info">
      <h3>Contact our Support Team</h3>
      <p class="phone">+63 977 781 5322</p>
      <p class="email">info@bambike.com</p>
    </div>
  </div>
</main>

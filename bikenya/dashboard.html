<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ride A Pedal - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { min-height: 100vh; background: url("images/bambike.jpg") no-repeat center center; background-size: cover; backdrop-filter: blur(2px); display: flex; flex-direction: column; }
.navbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 50px; background:linear-gradient(to bottom,#c48a17,#b97c0b);
      border-bottom:1px solid rgba(255,255,255,0.15); position:sticky; top:0; z-index:100; position:relative;
    }
    .logo { font-size:20px; font-weight:700; color:white; letter-spacing:2px; text-transform:uppercase; flex-shrink:0; }
    .nav-center { position:absolute; left:50%; transform:translateX(-50%); }
    .nav-links { list-style:none; display:flex; gap:30px; margin:0; }
    .nav-links a { text-decoration:none; color:rgba(255,255,255,0.85); font-weight:400; font-size:14px; letter-spacing:0.5px; transition:color 0.25s; }
    .nav-links a:hover { color:white; }
    .nav-links a.active { color:rgb(0, 0, 0); font-weight: bold; padding-bottom:2px; }
    .logout-btn-nav {
      padding:8px 22px; background:rgba(255,255,255,0.15); color:white;
      border:1px solid rgba(255,255,255,0.4); border-radius:25px; cursor:pointer;
      font-weight:600; font-size:13px; letter-spacing:0.5px; transition:all 0.25s; font-family:'Poppins',sans-serif;
    }
    .logout-btn-nav:hover { background:white; color:#2b1a0f; }
    @media(max-width:900px) { .nav-center { position:static; transform:none; } .navbar { flex-wrap:wrap; gap:10px; padding:15px 20px; } .nav-links { gap:12px; flex-wrap:wrap; } .nav-links a { font-size:12px; } }
    .hero { flex: 1; display: flex; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; }
    .hero-card {
      background:rgba(156, 102, 21, 0.897); padding: 60px 40px;
      border-radius: 40px; width: 100%; max-width: 800px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
    }
    .hero-card h1 { font-family: Cambria, serif; font-size: clamp(36px,6vw,56px); color: white; margin-bottom: 20px; }
    .hero-card p { color: white; font-size: 20px; margin-bottom: 35px; line-height: 1.6; }
    .btn {
      padding: 16px 45px; background: #1a0f08; color: white; border: none;
      border-radius: 35px; font-size: 18px; font-weight: 700; cursor: pointer;
      transition: 0.3s; text-decoration: none; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .btn:hover { background: black; transform: translateY(-3px); }
    @media(max-width:768px) { .navbar { padding: 15px 20px; } .nav-links { gap: 15px; } .nav-links a { font-size: 12px; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Ride A Pedal</div>
    <div class="nav-center"><ul class="nav-links">
        <li><a href="dashboard.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="Profile.html">Profile</a></li>
        <li><a href="support.html">Support</a></li>
      </ul></div>
      <button class="logout-btn-nav" id="logoutBtn">Log out</button>
  </nav>
  <section class="hero">
    <div class="hero-card">
      <h1>Welcome to Ride A Pedal!</h1>
      <p>Your journey through Manila's heritage starts here. Reserve your bike tickets easily and explore beautiful attractions with style.</p>
    </div>
  </section>
  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear(); sessionStorage.clear(); window.location.href = 'main.html';
    });
  </script>
</body>
</html>
